<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="0.4" cy="0.35" r="0.85">
      <stop offset="0%" stop-color="#FBF7F0"/>
      <stop offset="100%" stop-color="#F5EFE3"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Circle outline as olive leaf nod -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="#5A6B45" stroke-width="2" opacity="0.18"/>
  <!-- Wordmark "O" in italic serif -->
  <text x="256" y="332" font-family="Cormorant Garamond, Georgia, serif"
        font-size="320" font-style="italic" font-weight="500"
        text-anchor="middle" fill="#2C2A26">O</text>
  <!-- Subtle gold accent dot -->
  <circle cx="370" cy="180" r="10" fill="#B8956A"/>
</svg>
