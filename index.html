  <meta name="theme-color" content="#FBF7F0" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">

    tailwind.config = {
      theme: {
        extend: {
          colors: {
            cream: '#FBF7F0',
            'cream-deep': '#F5EFE3',
            charcoal: '#2C2A26',
            muted: '#7A746B',
            'muted-soft': '#A89F92',

</head>
<body class="bg-cream text-charcoal font-sans antialiased min-h-screen">
  <div id="root"></div>

  <script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>
  <script type="text/babel" data-type="module" data-presets="react">
    import React, { useState, useEffect, useMemo, useRef, useCallback } from 'https://esm.sh/react@18.3.1';
    import { createRoot } from 'https://esm.sh/react-dom@18.3.1/client';
    import { MENU, CATEGORIES, LANGS, t } from './menu.js';
    import * as store from './store.js';

    // ── i18n: UI metinleri ──────────────────────────────────────
    const UI = {

                       en: 'e.g. soft eggs, latte without milk…',
                       fr: 'ex. œufs mollets, latte sans lait…',
                       nl: 'bv. zachte eieren, latte zonder melk…' },
      total:         { tr: 'Toplam',     en: 'Total',    fr: 'Total',   nl: 'Totaal' },
      placeOrder:    { tr: 'Siparişi Gönder', en: 'Place Order', fr: 'Passer la Commande', nl: 'Bestelling Plaatsen' },
      sending:       { tr: 'Gönderiliyor…', en: 'Sending…', fr: 'Envoi…', nl: 'Verzenden…' },
      payAtTable:    { tr: 'Ödeme masada alınır', en: 'Payment at the table', fr: 'Paiement à la table', nl: 'Betaling aan tafel' },
      close:         { tr: 'Kapat',      en: 'Close',    fr: 'Fermer',  nl: 'Sluiten' },
      orderSummary:  { tr: 'Sipariş Özeti', en: 'Order Summary', fr: 'Résumé de Commande', nl: 'Besteloverzicht' },
      newOrder:      { tr: 'Tekrar sipariş ver', en: 'Place a new order', fr: 'Nouvelle commande', nl: 'Nieuwe bestelling' },
      approxTime:    { tr: '~15 dakika', en: '~15 minutes', fr: '~15 minutes', nl: '~15 minuten' },
      addedToCart:   { tr: 'sepete eklendi', en: 'added to cart', fr: 'ajouté au panier', nl: 'toegevoegd' },
      people:        { tr: 'kişi',           en: 'people',        fr: 'personnes',         nl: 'personen' },
      forPeople:     { tr: 'için',           en: 'for',           fr: 'pour',              nl: 'voor' },
      minPeople:     { tr: 'min.',           en: 'min.',          fr: 'min.',              nl: 'min.' },
      orderNotFound: { tr: 'Sipariş bulunamadı.', en: 'Order not found.', fr: 'Commande introuvable.', nl: 'Bestelling niet gevonden.' },
      status: {
        new:       { tr: 'Sipariş Alındı', en: 'Order Received', fr: 'Commande Reçue', nl: 'Bestelling Ontvangen' },
        preparing: { tr: 'Hazırlanıyor',   en: 'Preparing',      fr: 'En Préparation', nl: 'In Bereiding' },
        ready:     { tr: 'Hazır',          en: 'Ready',          fr: 'Prêt',           nl: 'Klaar' },
        served:    { tr: 'Servis Edildi',  en: 'Served',         fr: 'Servi',          nl: 'Geserveerd' },
      },
      statusShort: {
        new:       { tr: 'Alındı',     en: 'Received',  fr: 'Reçu',     nl: 'Ontvangen' },
        preparing: { tr: 'Hazırlık',   en: 'Preparing', fr: 'En cours', nl: 'Bereiding' },
        ready:     { tr: 'Hazır',      en: 'Ready',     fr: 'Prêt',     nl: 'Klaar' },
        served:    { tr: 'Servis',     en: 'Served',    fr: 'Servi',    nl: 'Geserveerd' },
      },
      statusDesc: {
        new:       { tr: 'Mutfak siparişinizi aldı', en: 'Kitchen received your order', fr: 'La cuisine a reçu votre commande', nl: 'De keuken heeft uw bestelling ontvangen' },
        preparing: { tr: 'Şefimiz hazırlıyor',       en: 'Our chef is preparing it',    fr: 'Notre chef prépare votre commande', nl: 'Onze chef bereidt het voor' },
        ready:     { tr: 'Garsonunuz masaya getiriyor', en: 'Your server is bringing it', fr: 'Votre serveur l\'apporte',     nl: 'Uw ober brengt het' },
        served:    { tr: 'Afiyet olsun!',            en: 'Enjoy your meal!',             fr: 'Bon appétit !',                  nl: 'Eet smakelijk!' },
      },
    };

    // ── HELPERS ────────────────────────────────────────────────
    const fmt = (n) => `€${n.toFixed(2).replace('.', ',')}`;
    const detectLang = () => {
      const stored = localStorage.getItem('olea:lang');
      if (stored && LANGS.some(l => l.code === stored)) return stored;
      const nav = (navigator.language || 'tr').slice(0, 2).toLowerCase();
      return LANGS.some(l => l.code === nav) ? nav : 'tr';
    };

    function getTableFromURL() {
      const p = new URLSearchParams(window.location.search);
      const m = p.get('masa') || p.get('table');
      const n = parseInt(m, 10);
      return Number.isFinite(n) && n > 0 ? n : null;
    }

    function setTableInURL(n) {
      const url = new URL(window.location.href);
      url.searchParams.set('masa', String(n));
      window.history.replaceState({}, '', url);
    }

    // ── LANG SWITCHER ──────────────────────────────────────────
    function LangSwitcher({ lang, onChange }) {
      return (
        <div className="flex items-center gap-0.5 bg-cream-deep/60 border border-border-soft rounded-full px-1 py-1">
          {LANGS.map(l => (
            <button
              key={l.code}
              onClick={() => onChange(l.code)}
              title={l.name}
              className={`px-2 py-0.5 rounded-full text-[10px] font-semibold tracking-wider transition-colors ${
                lang === l.code
                  ? 'bg-charcoal text-cream'
                  : 'text-muted hover:text-charcoal'
              }`}
            >
              {l.label}
            </button>
          ))}
        </div>
      );
    }

    // ── HEADER ─────────────────────────────────────────────────
    function Header({ table, scrolled, lang, onLangChange }) {
      return (
        <header className={`sticky top-0 z-30 bg-cream/95 backdrop-blur-sm transition-shadow ${scrolled ? 'header-elevated' : ''}`}>
          <div className="px-4 pt-safe pb-2 flex items-center justify-between gap-3">
            <div className="flex items-baseline gap-2 flex-shrink-0">
              <span className="font-display text-3xl text-charcoal leading-none italic">Olea</span>
              <span className="text-[10px] tracking-[0.25em] uppercase text-muted-soft font-medium">{t(UI.menuTag, lang)}</span>
            </div>
            <LangSwitcher lang={lang} onChange={onLangChange} />
          </div>
          <div className="px-4 pb-3 flex justify-end">
            <div className="flex items-center gap-2 px-3 py-1.5 rounded-full bg-cream-deep/70 border border-border-soft">
              <span className="w-1.5 h-1.5 rounded-full bg-olive shadow-[0_0_0_3px_rgba(90,107,69,0.18)]"></span>
              <span className="text-[11px] tracking-wide font-medium text-charcoal">{t(UI.table, lang)} {table} · {t(UI.welcome, lang)}</span>
            </div>
          </div>
        </header>
      );
    }

    // ── CATEGORY NAV ───────────────────────────────────────────
    function CategoryNav({ active, onSelect, hasItems, lang }) {
      const ref = useRef(null);
      // Aktif buton görünür alana kayar
      useEffect(() => {
        const el = ref.current?.querySelector(`[data-cat="${active}"]`);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
      }, [active]);

      return (
        <nav className="sticky top-[110px] z-20 bg-cream/95 backdrop-blur-sm cat-nav-shadow">
          <div ref={ref} className="no-scrollbar overflow-x-auto flex gap-1 px-3 py-2">
            {CATEGORIES.filter(c => hasItems(c.id)).map(c => (
              <button
                key={c.id}
                data-cat={c.id}
                onClick={() => onSelect(c.id)}
                className={`flex-shrink-0 px-3.5 py-2 rounded-full text-[12px] tracking-wide font-medium transition-all ${
                  active === c.id
                    ? 'bg-charcoal text-cream'
                    : 'text-muted hover:text-charcoal'
                }`}
              >
                <span className="mr-1.5 text-[13px]">{c.emoji}</span>{t(c.name, lang)}
              </button>
            ))}
          </div>
        </nav>
      );
    }

    // ── ITEM CARD ──────────────────────────────────────────────
    function ItemCard({ item, qty, onAdd, onRemove, lang }) {
      const btnRef = useRef(null);
      const isServes = !!item.serves;
      const step = isServes ? item.serves.step : 1;
      const max = isServes ? item.serves.max : 99;

      const handleAdd = () => {
        if (qty + step > max) return;
        onAdd(item, step);
        if (btnRef.current) {
          btnRef.current.classList.remove('add-pulse');
          void btnRef.current.offsetWidth;
          btnRef.current.classList.add('add-pulse');
        }
      };
      const handleRemove = () => onRemove(item, step);

      const name = t(item.name, lang);
      const desc = t(item.desc, lang);
      const priceNote = t(item.priceNote, lang);
      const peopleWord = t(UI.people, lang);
      const atMax = isServes && qty >= max;

      return (
        <article className="item-card bg-white border border-border-soft rounded-2xl overflow-hidden flex flex-col">
          <div className="photo-frame relative">
            {item.photo ? (
              <img src={item.photo} alt={name} loading="lazy" />
            ) : (
              <div className="photo-placeholder w-full h-full">
                <span>{item.emoji || '🍽️'}</span>
              </div>
            )}
            {qty > 0 && (
              <div className="absolute top-2 left-2 bg-charcoal text-cream text-[11px] font-medium px-2 py-0.5 rounded-full">
                {isServes ? `${qty} ${peopleWord}` : `×${qty}`}
              </div>
            )}
            {isServes && (
              <div className="absolute top-2 right-2 bg-gold text-white text-[9px] font-semibold tracking-wide uppercase px-2 py-0.5 rounded-full">
                {t(UI.minPeople, lang)} {item.serves.min} {peopleWord}
              </div>
            )}
          </div>
          <div className="p-4 flex flex-col gap-2 flex-1">
            <div className="flex-1">
              <h3 className="text-[15px] font-medium leading-snug text-charcoal">{name}</h3>
              {desc && (
                <p className="text-[12px] text-muted mt-1 leading-relaxed line-clamp-2">{desc}</p>
              )}
            </div>
            <div className="flex items-center justify-between mt-1">
              <div className="flex items-baseline gap-1">
                <span className="font-display text-xl text-gold">{fmt(item.price)}</span>
                {priceNote && (
                  <span className="text-[10px] text-muted-soft tracking-wide">/ {priceNote}</span>
                )}
              </div>
              {qty > 0 ? (
                <div className="flex items-center gap-1.5 bg-cream-deep rounded-full px-1 py-1">
                  <button
                    onClick={handleRemove}
                    className="w-7 h-7 rounded-full bg-white border border-border-soft flex items-center justify-center text-charcoal hover:bg-cream"
                    aria-label={t(UI.decrease, lang)}
                  >−</button>
                  <span className="text-[13px] font-medium px-1 text-center min-w-[36px]">
                    {isServes ? `${qty} ${peopleWord}` : qty}
                  </span>
                  <button
                    ref={btnRef}
                    onClick={handleAdd}
                    disabled={atMax}
                    className={`w-7 h-7 rounded-full text-white flex items-center justify-center transition-colors ${atMax ? 'bg-muted-soft cursor-not-allowed' : 'bg-gold hover:bg-charcoal'}`}
                    aria-label={t(UI.increase, lang)}
                  >+</button>
                </div>
              ) : (
                <button
                  ref={btnRef}
                  onClick={handleAdd}
                  className="w-9 h-9 rounded-full bg-charcoal text-cream flex items-center justify-center text-lg leading-none hover:bg-gold transition-colors"
                  aria-label={t(UI.addToCart, lang)}
                >+</button>
              )}
            </div>
            {isServes && qty > 0 && (
              <div className="text-[11px] text-muted-soft tracking-wide pt-1 border-t border-border-soft mt-1 flex justify-between">
                <span>{qty} {peopleWord} {t(UI.forPeople, lang)}</span>
                <span className="font-display text-charcoal text-[14px]">{fmt(item.price * qty)}</span>
              </div>
            )}
          </div>
        </article>
      );
    }

    // ── MENU LIST ──────────────────────────────────────────────
    function MenuList({ cart, onAdd, onRemove, onCategoryEnter, sectionsRef, lang }) {
      // Scroll-based aktif kategori takibi (IntersectionObserver yerine
      // basit scroll handler — yatay da dikey de kararli, jitter yok)
      useEffect(() => {
        let raf = null;
        const TRIGGER_Y = 150;

        const update = () => {
          raf = null;
          let activeCat = null;
          let bestTop = -Infinity;
          // Trigger cizgisinin uzerinde kalan en alttaki section aktiftir
          for (const c of CATEGORIES) {
            const el = sectionsRef.current[c.id];
            if (!el) continue;
            const r = el.getBoundingClientRect();
            if (r.top <= TRIGGER_Y && r.top > bestTop) {
              bestTop = r.top;
              activeCat = c.id;
            }
          }
          if (activeCat) onCategoryEnter(activeCat);
        };

        const onScroll = () => {
          if (raf == null) raf = requestAnimationFrame(update);
        };

        // Ilk render sonrasi bir kez calistir
        update();
        window.addEventListener('scroll', onScroll, { passive: true });
        return () => {
          window.removeEventListener('scroll', onScroll);
          if (raf != null) cancelAnimationFrame(raf);
        };
      }, [onCategoryEnter, sectionsRef]);

      const grouped = useMemo(() => {
        const m = {};
        for (const c of CATEGORIES) m[c.id] = [];
        for (const i of MENU) m[i.cat]?.push(i);
        return m;
      }, []);

      const qtyMap = useMemo(() => {
        const m = {};
        cart.forEach(it => { m[it.id] = it.qty; });
        return m;
      }, [cart]);

      return (
        <main className="px-4 pt-4 pb-32 max-w-5xl mx-auto">
          {CATEGORIES.map(c => {
            const items = grouped[c.id];
            if (!items?.length) return null;
            return (
              <section
                key={c.id}
                ref={el => { sectionsRef.current[c.id] = el; }}
                data-cat={c.id}
                className="mb-10"
              >
                <div className="flex items-baseline gap-3 mb-4 px-1">
                  <h2 className="font-display text-3xl text-charcoal italic">{t(c.name, lang)}</h2>
                  <span className="text-[10px] uppercase tracking-[0.18em] text-muted-soft">{items.length} {t(UI.itemsLower, lang)}</span>
                </div>
                <div className="menu-grid">
                  {items.map(item => (
                    <ItemCard
                      key={item.id}
                      item={item}
                      qty={qtyMap[item.id] || 0}
                      onAdd={onAdd}
                      onRemove={onRemove}
                      lang={lang}
                    />
                  ))}
                </div>
              </section>
            );
          })}
          <div className="text-center text-[10px] tracking-[0.2em] uppercase text-muted-soft py-6">
            ── Olea · {t(UI.brandTag, lang)} ──
          </div>
        </main>
      );
    }

    // ── CART PILL (yüzen sepet butonu) ─────────────────────────
    function CartPill({ count, total, onClick, lang }) {
      if (count === 0) return null;
      return (
        <button
          onClick={onClick}
          className="cart-pill fixed bottom-5 left-1/2 -translate-x-1/2 z-40 bg-charcoal text-cream px-5 py-3.5 rounded-full shadow-2xl flex items-center gap-3 min-w-[260px] hover:bg-gold transition-colors pb-safe"
          style={{ boxShadow: '0 16px 40px -16px rgba(44,42,38,0.5)' }}
        >
          <span className="bg-gold w-7 h-7 rounded-full flex items-center justify-center text-[12px] font-semibold">{count}</span>
          <span className="text-[13px] font-medium flex-1 text-left">{t(UI.viewCart, lang)}</span>
          <span className="font-display text-lg text-gold-soft">{fmt(total)}</span>
        </button>
      );
    }

    // ── CART MODAL ─────────────────────────────────────────────
    function CartModal({ cart, notes, onClose, onAdd, onRemove, onSetNotes, onSubmit, lang, submitting }) {
      const total = cart.reduce((s, it) => s + it.price * it.qty, 0);
      const count = cart.reduce((s, it) => s + it.qty, 0);

      return (
        <div className="fixed inset-0 z-50 flex flex-col bg-charcoal/40 modal-backdrop" onClick={(e) => e.target === e.currentTarget && onClose()}>
          <div className="modal-content mt-auto bg-cream w-full sm:max-w-lg sm:mx-auto sm:my-auto sm:rounded-3xl rounded-t-3xl flex flex-col max-h-[92vh] overflow-hidden">
            <div className="px-5 py-4 border-b flex items-center justify-between">
              <div>
                <h2 className="font-display text-2xl italic">{t(UI.yourCart, lang)}</h2>
                <p className="text-[12px] text-muted mt-0.5">{count} {t(UI.itemsLower, lang)}</p>
              </div>
              <button onClick={onClose} className="w-9 h-9 rounded-full bg-cream-deep flex items-center justify-center text-charcoal hover:bg-border-soft" aria-label={t(UI.close, lang)}>✕</button>
            </div>

            <div className="flex-1 overflow-y-auto px-5 py-4">
              {cart.length === 0 ? (
                <div className="text-center text-muted py-12">{t(UI.cartEmpty, lang)}</div>
              ) : (
                <ul className="divide-y divide-border-soft">
                  {cart.map(item => (
                    <li key={item.id} className="py-3 flex items-center gap-3">
                      <div className="w-14 h-14 rounded-xl overflow-hidden flex-shrink-0 bg-cream-deep">
                        {item.photo ? (
                          <img src={item.photo} alt="" className="w-full h-full object-cover" />
                        ) : (
                          <div className="w-full h-full flex items-center justify-center text-2xl text-gold-soft">{item.emoji || '🍽️'}</div>
                        )}
                      </div>
                      <div className="flex-1 min-w-0">
                        <div className="text-[14px] font-medium text-charcoal truncate">{item.name}</div>
                        <div className="text-[12px] text-muted">
                          {item.serves
                            ? `${fmt(item.price)} × ${item.qty} ${t(UI.people, lang)} = ${fmt(item.price * item.qty)}`
                            : `${fmt(item.price)} × ${item.qty}`}
                        </div>
                      </div>
                      <div className="flex items-center gap-1.5 bg-white rounded-full p-1 border border-border-soft">
                        <button onClick={() => onRemove(item, item.serves?.step || 1)} className="w-7 h-7 rounded-full hover:bg-cream-deep flex items-center justify-center" aria-label={t(UI.decrease, lang)}>−</button>
                        <span className="text-[13px] font-medium px-1 text-center min-w-[24px]">
                          {item.qty}
                        </span>
                        <button onClick={() => onAdd(item, item.serves?.step || 1)} className="w-7 h-7 rounded-full bg-gold text-white flex items-center justify-center" aria-label={t(UI.increase, lang)}>+</button>
                      </div>
                    </li>
                  ))}
                </ul>
              )}

              {cart.length > 0 && (
                <div className="mt-5">
                  <label className="block text-[12px] tracking-wide uppercase text-muted-soft mb-2 font-medium">{t(UI.orderNote, lang)}</label>
                  <textarea
                    value={notes}
                    onChange={(e) => onSetNotes(e.target.value)}
                    placeholder={t(UI.notePh, lang)}
                    className="w-full px-4 py-3 rounded-2xl border border-border-soft bg-white resize-none focus:outline-none focus:border-gold text-[13px] leading-relaxed"
                    rows={3}
                  />
                </div>
              )}
            </div>

            {cart.length > 0 && (
              <div className="px-5 py-4 border-t bg-white">
                <div className="flex items-baseline justify-between mb-3">
                  <span className="text-[13px] tracking-wide uppercase text-muted">{t(UI.total, lang)}</span>
                  <span className="font-display text-3xl text-charcoal">{fmt(total)}</span>
                </div>
                <button
                  onClick={onSubmit}
                  disabled={submitting}
                  className={`w-full py-4 rounded-2xl font-medium tracking-wide transition-colors ${
                    submitting ? 'bg-muted-soft text-cream cursor-wait' : 'bg-charcoal text-cream hover:bg-gold'
                  }`}
                >
                  {submitting ? t(UI.sending, lang) : t(UI.placeOrder, lang)}
                </button>
                <p className="text-[10px] tracking-wide text-center text-muted-soft mt-2">{t(UI.payAtTable, lang)}</p>
              </div>
            )}
          </div>
        </div>
      );
    }

    // ── TABLE PROMPT (URL'de masa yoksa) ───────────────────────
    function TablePrompt({ onSet, lang, onLangChange }) {
      const [val, setVal] = useState('');
      const submit = (e) => {
        e?.preventDefault();
        const n = parseInt(val, 10);
        if (Number.isFinite(n) && n > 0 && n < 1000) onSet(n);
      };
      return (
        <div className="fixed inset-0 z-50 bg-cream flex flex-col items-center justify-center px-6">
          <div className="absolute top-4 right-4 pt-safe">
            <LangSwitcher lang={lang} onChange={onLangChange} />
          </div>
          <div className="text-center mb-8">
            <div className="font-display text-5xl italic text-charcoal mb-2">Olea</div>
            <div className="text-[11px] tracking-[0.3em] uppercase text-muted">{t(UI.brandTag, lang)}</div>
          </div>
          <form onSubmit={submit} className="w-full max-w-xs">
            <label className="block text-[12px] tracking-wide uppercase text-muted-soft mb-2 text-center">{t(UI.enterTable, lang)}</label>
            <input
              type="number"
              inputMode="numeric"
              autoFocus
              value={val}
              onChange={(e) => setVal(e.target.value)}
              placeholder={t(UI.tablePh, lang)}
              className="w-full px-5 py-4 rounded-2xl border-2 border-border-soft bg-white text-center text-2xl font-display focus:outline-none focus:border-gold"
            />
            <button
              type="submit"
              disabled={!val}
              className="w-full mt-3 py-4 rounded-2xl bg-charcoal text-cream font-medium disabled:opacity-40 hover:bg-gold transition-colors"
            >
              {t(UI.openMenu, lang)}
            </button>
          </form>
          <p className="text-[11px] text-muted-soft mt-6 text-center max-w-xs">
            {t(UI.tableHelp, lang)}
          </p>
        </div>
      );
    }

    // ── CONFIRMATION ───────────────────────────────────────────
    function StatusFlow({ status, lang }) {
      const stages = ['new', 'preparing', 'ready', 'served'];
      const idx = stages.indexOf(status);
      return (
        <div className="flex items-center justify-between max-w-md mx-auto px-2">
          {stages.map((s, i) => (
            <React.Fragment key={s}>
              <div className="flex flex-col items-center gap-1.5 flex-shrink-0">
                <div className={`w-3 h-3 rounded-full transition-all ${i <= idx ? 'bg-olive scale-110' : 'bg-border-soft'}`}></div>
                <div className={`text-[9px] tracking-wide uppercase ${i <= idx ? 'text-olive font-medium' : 'text-muted-soft'}`}>
                  {t(UI.statusShort[s], lang)}
                </div>
              </div>
              {i < stages.length - 1 && (
                <div className={`flex-1 h-px mx-1 ${i < idx ? 'bg-olive' : 'bg-border-soft'}`}></div>
              )}
            </React.Fragment>
          ))}
        </div>
      );
    }

    function ConfirmationScreen({ orderId, onNew, lang, onLangChange }) {
      const [order, setOrder] = useState(() => store.getOrderById(orderId));

      useEffect(() => {
        const refresh = () => setOrder(store.getOrderById(orderId));
        const unsub = store.subscribe((msg) => {
          if (msg.type === 'order:update' && msg.id === orderId) refresh();
          if (msg.type === 'order:served' && msg.id === orderId) refresh();
          if (msg.type === 'storage:change') refresh();
        });
        return unsub;
      }, [orderId]);

      if (!order) {
        return <div className="min-h-screen flex items-center justify-center text-muted">{t(UI.orderNotFound, lang)}</div>;
      }

      return (
        <div className="min-h-screen flex flex-col bg-cream">
          <div className="absolute top-4 right-4 pt-safe">
            <LangSwitcher lang={lang} onChange={onLangChange} />
          </div>
          <div className="flex-1 flex flex-col items-center justify-center px-6 py-12 text-center">
            <div className="tick-circle w-20 h-20 rounded-full bg-olive/15 flex items-center justify-center mb-6">
              <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
                <path d="M10 20 L17 27 L30 13" stroke="#5A6B45" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" />
              </svg>
            </div>
            <h1 className="font-display text-4xl italic text-charcoal mb-2">{t(UI.status[order.status], lang)}</h1>
            <p className="text-muted mb-1">{t(UI.statusDesc[order.status], lang)}</p>
            <p className="text-[13px] text-muted-soft mb-8">{t(UI.table, lang)} {order.table} · {t(UI.approxTime, lang)}</p>

            <div className="w-full max-w-md mb-10">
              <StatusFlow status={order.status} lang={lang} />
            </div>

            <div className="bg-white border border-border-soft rounded-2xl p-5 w-full max-w-md text-left mb-6">
              <div className="text-[11px] tracking-[0.18em] uppercase text-muted-soft mb-3">{t(UI.orderSummary, lang)}</div>
              <ul className="divide-y divide-border-soft">
                {order.items.map(it => (
                  <li key={it.id} className="py-2 flex justify-between gap-2 text-[13px]">
                    <span className="text-charcoal">
                      {it.isServes
                        ? `${it.name} · ${it.qty} ${t(UI.people, lang)}`
                        : `${it.qty}× ${it.name}`}
                    </span>
                    <span className="text-muted">{fmt(it.price * it.qty)}</span>
                  </li>
                ))}
              </ul>
              {order.notes && (
                <div className="mt-3 pt-3 border-t text-[12px] text-muted italic">"{order.notes}"</div>
              )}
              <div className="mt-3 pt-3 border-t flex justify-between items-baseline">
                <span className="text-[12px] uppercase tracking-wide text-muted">{t(UI.total, lang)}</span>
                <span className="font-display text-2xl text-charcoal">{fmt(order.total)}</span>
              </div>
            </div>

            <button
              onClick={onNew}
              className="text-[13px] underline text-muted hover:text-charcoal"
            >
              {t(UI.newOrder, lang)}
            </button>
          </div>
        </div>
      );
    }

    // ── ROOT APP ───────────────────────────────────────────────
    function App() {
      const [lang, setLang] = useState(detectLang);
      const [table, setTable] = useState(getTableFromURL);
      const [view, setView] = useState('menu'); // menu | confirmation
      const [activeCategory, setActiveCategory] = useState(CATEGORIES[0].id);
      const [cart, setCart] = useState([]);     // [{id, name, price, qty, photo, emoji}]
      const [notes, setNotes] = useState('');
      const [cartOpen, setCartOpen] = useState(false);
      const [activeOrderId, setActiveOrderId] = useState(null);
      const [scrolled, setScrolled] = useState(false);
      const [toast, setToast] = useState(null);

      // Section ref'leri ve programmatic-scroll kilidi (kategori click bug'i icin)
      const sectionsRef = useRef({});
      const programmaticScrollRef = useRef(false);
      const programmaticTimeoutRef = useRef(null);

      // Dil secimi localStorage'a kaydedilir + html lang attribute guncellenir
      useEffect(() => {
        localStorage.setItem('olea:lang', lang);
        document.documentElement.lang = lang;
      }, [lang]);

      // Scroll listener (header gölgesi)
      useEffect(() => {
        const onScroll = () => setScrolled(window.scrollY > 8);
        window.addEventListener('scroll', onScroll, { passive: true });
        return () => window.removeEventListener('scroll', onScroll);
      }, []);

      // Toast otomatik kapat
      useEffect(() => {
        if (!toast) return;
        const t = setTimeout(() => setToast(null), 2500);
        return () => clearTimeout(t);
      }, [toast]);

      const cartCount = cart.reduce((s, i) => s + i.qty, 0);
      const cartTotal = cart.reduce((s, i) => s + i.price * i.qty, 0);

      const handleSetTable = (n) => {
        setTable(n);
        setTableInURL(n);
      };

      const handleAdd = useCallback((item, n = 1) => {
        const localizedName = t(item.name, lang);
        const isServes = !!item.serves;
        setCart(prev => {
          const idx = prev.findIndex(i => i.id === item.id);
          if (idx >= 0) {
            const next = [...prev];
            next[idx] = { ...next[idx], qty: next[idx].qty + n };
            return next;
          }
          return [...prev, {
            id: item.id, name: localizedName, price: item.price,
            photo: item.photo, emoji: item.emoji, qty: n,
            serves: item.serves,
          }];
        });
        const suffix = isServes ? ` (${n} ${t(UI.people, lang)})` : '';
        setToast(`${localizedName}${suffix} ${t(UI.addedToCart, lang)}`);
      }, [lang]);

      const handleRemove = useCallback((item, n = 1) => {
        const min = item.serves?.min || 1;
        setCart(prev => {
          const idx = prev.findIndex(i => i.id === item.id);
          if (idx < 0) return prev;
          const next = [...prev];
          const newQty = next[idx].qty - n;
          if (newQty < min) {
            next.splice(idx, 1);
          } else {
            next[idx] = { ...next[idx], qty: newQty };
          }
          return next;
        });
      }, []);

      const [submitting, setSubmitting] = useState(false);
      const handleSubmit = async () => {
        if (submitting) return;
        setSubmitting(true);
        try {
          const order = await store.placeOrder({
            table,
            items: cart.map(i => ({
              id: i.id, name: i.name, price: i.price, qty: i.qty,
              isServes: !!i.serves,
            })),
            notes,
            total: cartTotal,
          });
          setActiveOrderId(order.id);
          setCart([]);
          setNotes('');
          setCartOpen(false);
          setView('confirmation');
          window.scrollTo(0, 0);
        } catch (err) {
          console.error('Sipariş gönderilemedi', err);
          alert('Sipariş gönderilemedi: ' + (err.message || err));
        } finally {
          setSubmitting(false);
        }
      };

      const handleNewOrder = () => {
        setActiveOrderId(null);
        setView('menu');
        window.scrollTo(0, 0);
      };

      // Kategori tab tiklama: state + scroll
      const handleCategoryClick = useCallback((catId) => {
        setActiveCategory(catId);
        const el = sectionsRef.current[catId];
        if (!el) return;
        // IntersectionObserver'i bu sirada gate et
        programmaticScrollRef.current = true;
        clearTimeout(programmaticTimeoutRef.current);
        const top = el.getBoundingClientRect().top + window.scrollY - 130;
        window.scrollTo({ top, behavior: 'smooth' });
        // Smooth scroll bittiginde gate'i kaldir (~700ms genelde yeter)
        programmaticTimeoutRef.current = setTimeout(() => {
          programmaticScrollRef.current = false;
        }, 800);
      }, []);

      // Observer'dan gelen aktif kategori — programmatic scroll sirasinda yoksay
      const handleCategoryEnter = useCallback((catId) => {
        if (programmaticScrollRef.current) return;
        setActiveCategory(prev => prev === catId ? prev : catId);
      }, []);

      const hasItems = (catId) => MENU.some(i => i.cat === catId);

      // ── Render ───────────────────────────────────────
      if (table === null) {
        return <TablePrompt onSet={handleSetTable} lang={lang} onLangChange={setLang} />;
      }

      if (view === 'confirmation' && activeOrderId) {
        return <ConfirmationScreen orderId={activeOrderId} onNew={handleNewOrder} lang={lang} onLangChange={setLang} />;
      }

      return (
        <>
          <Header table={table} scrolled={scrolled} lang={lang} onLangChange={setLang} />
          <CategoryNav active={activeCategory} onSelect={handleCategoryClick} hasItems={hasItems} lang={lang} />
          <MenuList
            cart={cart}
            onAdd={handleAdd}
            onRemove={handleRemove}
            onCategoryEnter={handleCategoryEnter}
            sectionsRef={sectionsRef}
            lang={lang}
          />
          <CartPill count={cartCount} total={cartTotal} onClick={() => setCartOpen(true)} lang={lang} />
          {cartOpen && (
            <CartModal
              cart={cart}
              notes={notes}
              onClose={() => setCartOpen(false)}
              onAdd={handleAdd}
              onRemove={handleRemove}
              onSetNotes={setNotes}
              onSubmit={handleSubmit}
              lang={lang}
              submitting={submitting}
            />
          )}
          {toast && <div className="toast">{toast}</div>}
        </>
      );
    }

    createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
