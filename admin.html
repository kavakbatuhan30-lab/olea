    const detectLang = () => {
      const stored = localStorage.getItem('olea:lang');
      if (stored && LANGS.some(l => l.code === stored)) return stored;
      const nav = (navigator.language || 'tr').slice(0, 2).toLowerCase();
      return LANGS.some(l => l.code === nav) ? nav : 'tr';
    };

    const fmt = (n) => `€${n.toFixed(2).replace('.', ',')}`;

    // ── Admin sifre ────────────────────────────────────────────
    // PATRON: Bu sifreyi degistirmek icin alttaki satiri duzenle.
    // Sifrenin source'da gorunmesi sorun degil — gercek guvenlik
    // Firestore Security Rules'da. Bu kapi sadece UX engeli.
    const ADMIN_PASSWORD = 'olea2026';
    const AUTH_KEY = 'olea:admin-auth';
    const isLoggedIn = () => localStorage.getItem(AUTH_KEY) === 'ok';
    const setLoggedIn = (yes) => yes
      ? localStorage.setItem(AUTH_KEY, 'ok')
      : localStorage.removeItem(AUTH_KEY);

    function timeAgo(ms, lang) {
      const diff = Date.now() - ms;
      const s = Math.floor(diff / 1000);
      if (s < 60) return `${s} ${t(UI.ago.sec, lang)}`;
      const m = Math.floor(s / 60);
      if (m < 60) return `${m} ${t(UI.ago.min, lang)}`;
      const h = Math.floor(m / 60);
      return `${h} ${t(UI.ago.hour, lang)}`;
    }

    function timeStr(ms) {
      const d = new Date(ms);
      return `${d.getHours().toString().padStart(2, '0')}:${d.getMinutes().toString().padStart(2, '0')}`;
    }

    // ── Web Audio API ile bip sesi ─────────────────────────────
    function playBeep() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const now = ctx.currentTime;

        // 2 notalı zarif ding
        [
          { freq: 880, t: 0,    dur: 0.18, vol: 0.18 },
          { freq: 1320, t: 0.10, dur: 0.32, vol: 0.14 },
        ].forEach(({ freq, t, dur, vol }) => {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = 'sine';
          osc.frequency.value = freq;
          gain.gain.setValueAtTime(0, now + t);
          gain.gain.linearRampToValueAtTime(vol, now + t + 0.02);
          gain.gain.exponentialRampToValueAtTime(0.001, now + t + dur);
          osc.connect(gain).connect(ctx.destination);
          osc.start(now + t);
          osc.stop(now + t + dur + 0.05);
        });

        setTimeout(() => ctx.close(), 800);
      } catch (e) {
        console.warn('Beep failed', e);
      }
    }

    function tryNotify(title, body) {
      try {
        if (!('Notification' in window)) return;
        if (Notification.permission === 'granted') {
          new Notification(title, { body, icon: '/favicon.ico', tag: 'olea-order' });
        }
      } catch {}

    // ── ORDER CARD ─────────────────────────────────────────────

    };

    function OrderCard({ order, isNew, onAdvance, onCancel, onClick, lang }) {
      const [now, setNow] = useState(Date.now());
      useEffect(() => {
        const tm = setInterval(() => setNow(Date.now()), 30000);
        return () => clearInterval(tm);
      }, []);

        if (e.target.closest('button')) return;
        onClick?.(order);
      };

          onClick={handleCardClick}
          className={`bg-white border rounded-2xl overflow-hidden flex flex-col cursor-pointer hover:border-gold/40 transition-colors ${isNew ? 'order-flash order-card-new' : ''}`}

                <span className={`text-[10px] tracking-wide uppercase px-2 py-0.5 rounded-full ${dot.bg} ${dot.text} font-semibold`}>

              <div className="text-[11px] text-muted mt-0.5">
                {timeStr(order.createdAt)} · {timeAgo(order.createdAt, lang)}
              </div>
            </div>
            <div className="text-right">
              <div className="font-display text-2xl text-gold">{fmt(order.total)}</div>
              <div className="text-[10px] tracking-wide uppercase text-muted-soft">{order.items.reduce((s, i) => s + i.qty, 0)} {t(UI.items, lang)}</div>
            </div>
          </div>

              {order.items.map(it => (
                <li key={it.id} className="flex justify-between gap-3 text-[13px]">
                  <span className="text-charcoal">
                    {it.isServes ? (
                      <>
                        <span className="inline-block min-w-[24px] text-gold font-semibold">{it.qty}</span>
                        <span className="mr-1 text-[11px] uppercase tracking-wide text-gold font-semibold">{t(UI.people, lang)}</span>
                        {it.name}
                      </>
                    ) : (
                      <>
                        <span className="inline-block min-w-[24px] text-gold font-semibold">{it.qty}×</span>
                        {it.name}
                      </>
                    )}
                  </span>
                  <span className="text-muted text-[12px]">{fmt(it.price * it.qty)}</span>
                </li>
              ))}
            </ul>

              <div className="mt-3 p-2.5 bg-cream-deep border-l-2 border-gold rounded text-[12px] italic text-charcoal-soft">

    // ── ARCHIVE (servis edilen) ────────────────────────────────
    function Archive({ orders, lang }) {
      const [open, setOpen] = useState(false);

      // Bugün servis edilenleri filtrele
      const today = useMemo(() => {
        const start = new Date();
        start.setHours(0, 0, 0, 0);
        return orders.filter(o => o.updatedAt >= start.getTime());
      }, [orders]);

      if (today.length === 0) return null;

      return (
        <section className="mt-8 max-w-7xl mx-auto px-6">
          <button
            onClick={() => setOpen(o => !o)}
            className="flex items-center gap-2 text-[12px] tracking-wide uppercase text-muted hover:text-charcoal"
          >
            <span>{open ? '▾' : '▸'}</span>
            {t(UI.todayServed, lang)} ({today.length})
          </button>
          {open && (
            <div className="mt-4 grid gap-2">
              {today.slice(0, 12).map(o => (
                <div key={o.id} className="bg-cream-deep/60 border border-border-soft rounded-xl px-4 py-3 flex justify-between items-center text-[13px]">
                  <div className="flex items-baseline gap-3">
                    <span className="font-display text-lg italic text-charcoal">{t(UI.table, lang)} {o.table}</span>
                    <span className="text-muted">{o.items.reduce((s, i) => s + i.qty, 0)} {t(UI.items, lang)}</span>
                    <span className="text-[11px] text-muted-soft">{timeStr(o.updatedAt)}</span>
                  </div>
                  <span className="font-display text-lg text-gold">{fmt(o.total)}</span>
                </div>
              ))}
            </div>
          )}
        </section>
      );
    }

    // ── STATS: zaman dilimi başlangıcı ─────────────────────────
    function startOfPeriod(period) {
      const d = new Date();
      d.setHours(0, 0, 0, 0);
      if (period === 'today') return d.getTime();
      if (period === 'week') {
        // Pazartesi başı (FR/NL/TR konvansiyonu)
        const dow = (d.getDay() + 6) % 7; // 0 = Mon
        d.setDate(d.getDate() - dow);
        return d.getTime();
      }
      if (period === 'month') {
        d.setDate(1);
        return d.getTime();
      }
      return 0; // all time
    }

    // ── STATS: tüm sipariş veri toplama (active + archive) ─────
    function aggregate(orders, lang) {
      const totalRevenue = orders.reduce((s, o) => s + (o.total || 0), 0);
      const orderCount = orders.length;
      const avgBasket = orderCount > 0 ? totalRevenue / orderCount : 0;

      // Item counts (qty toplamı)
      const itemMap = new Map();
      const catMap = new Map();
      const hourly = new Array(24).fill(0);

      orders.forEach(o => {
        const hour = new Date(o.createdAt).getHours();
        hourly[hour] += o.total || 0;

        (o.items || []).forEach(it => {
          const key = it.id;
          const prev = itemMap.get(key) || { id: key, name: it.name, qty: 0, revenue: 0 };
          prev.qty += it.qty || 0;
          prev.revenue += (it.price || 0) * (it.qty || 0);
          itemMap.set(key, prev);

          // Kategori — menu lookup'tan
          const menuItem = MENU_BY_ID[it.id];
          if (menuItem) {
            const catId = menuItem.cat;
            const c = catMap.get(catId) || { id: catId, qty: 0, revenue: 0 };
            c.qty += it.qty || 0;
            c.revenue += (it.price || 0) * (it.qty || 0);
            catMap.set(catId, c);
          }
        });
      });

      const topItems = [...itemMap.values()]
        .sort((a, b) => b.qty - a.qty)
        .slice(0, 10);

      const categories = [...catMap.values()]
        .map(c => ({ ...c, name: t(CAT_BY_ID[c.id]?.name, lang) || c.id, emoji: CAT_BY_ID[c.id]?.emoji || '🍽️' }))
        .sort((a, b) => b.revenue - a.revenue);

      return { totalRevenue, orderCount, avgBasket, topItems, categories, hourly };
    }

    // ── ROOT ───────────────────────────────────────────────────
    function App() {
      const [lang, setLang] = useState(detectLang);
      const [authed, setAuthed] = useState(isLoggedIn);
      const [tab, setTab] = useState(() => localStorage.getItem('olea:admin-tab') || 'orders');
      const [detailOrder, setDetailOrder] = useState(null);
      const [printOrder, setPrintOrder] = useState(null);
      const [printMode, setPrintMode] = useState(null); // 'kitchen' | 'customer' | null

      useEffect(() => {
        localStorage.setItem('olea:admin-tab', tab);
      }, [tab]);

      // Yazdırma — print state set edilince window.print() tetikle
      useEffect(() => {
        if (!printOrder || !printMode) return;
        // Bir frame bekle ki React DOM'a yansıtsın
        const t = setTimeout(() => {
          window.print();
        }, 50);
        const reset = () => { setPrintOrder(null); setPrintMode(null); };
        window.addEventListener('afterprint', reset, { once: true });
        return () => {
          clearTimeout(t);
          window.removeEventListener('afterprint', reset);
        };
      }, [printOrder, printMode]);

      const handlePrint = (mode) => {
        if (!detailOrder) return;
        setPrintMode(mode);
        setPrintOrder(detailOrder);
      };
      const [orders, setOrders] = useState(() => store.getActiveOrders());
      const [archive, setArchive] = useState(() => store.getArchivedOrders());
      const [soundOn, setSoundOn] = useState(true);
      const [newOrderIds, setNewOrderIds] = useState(new Set()); // animasyon için
      const audioUnlockedRef = useRef(false);

      // Dil persistence
      useEffect(() => {
        localStorage.setItem('olea:lang', lang);
        document.documentElement.lang = lang;
      }, [lang]);

      const refresh = useCallback(() => {
        setOrders(store.getActiveOrders());
        setArchive(store.getArchivedOrders());
      }, []);

      // Audio unlock (browser policy: user etkileşimi olmadan ses çalınmaz)
      useEffect(() => {
        const unlock = () => {
          if (audioUnlockedRef.current) return;
          try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            ctx.resume();
            audioUnlockedRef.current = true;
            ctx.close();
          } catch {}
        };
        window.addEventListener('click', unlock, { once: true });
        window.addEventListener('keydown', unlock, { once: true });
        return () => {
          window.removeEventListener('click', unlock);
          window.removeEventListener('keydown', unlock);
        };
      }, []);

      // Notification permission iste
      useEffect(() => {
        if ('Notification' in window && Notification.permission === 'default') {
          // İlk tıklamadan sonra iste
          const ask = () => {
            Notification.requestPermission().catch(() => {});
            window.removeEventListener('click', ask);
          };
          window.addEventListener('click', ask, { once: true });
        }
      }, []);

      // Cikis
      const handleLogout = () => {
        if (confirm(t(UI.logoutConfirm, lang))) {
          setLoggedIn(false);
          setAuthed(false);
        }
      };

      // Subscribe to store changes
      useEffect(() => {
        if (!authed) return;
        const unsub = store.subscribe((msg) => {
          if (msg.type === 'order:new') {
            refresh();
            // animasyon için işaretle
            setNewOrderIds(prev => {
              const next = new Set(prev);
              next.add(msg.order.id);
              return next;
            });
            setTimeout(() => {
              setNewOrderIds(prev => {
                const next = new Set(prev);
                next.delete(msg.order.id);
                return next;
              });
            }, 1500);

            if (soundOn) playBeep();
            tryNotify(t(UI.newOrderTitle, lang), `${t(UI.table, lang)} ${msg.order.table} · ${fmt(msg.order.total)}`);
          } else if (msg.type === 'order:update' || msg.type === 'order:served' || msg.type === 'order:delete' || msg.type === 'reset' || msg.type === 'storage:change') {
            refresh();
          }
        });
        return unsub;
      }, [soundOn, refresh, lang, authed]);

      const handleAdvance = (id, status) => {
        store.updateOrderStatus(id, status).catch(err => console.error('[admin] updateStatus failed', err));
        refresh();
      };

      const handleCancel = (id) => {
        store.deleteOrder(id).catch(err => console.error('[admin] deleteOrder failed', err));
        refresh();
      };

      const handleClear = () => {
        if (confirm(t(UI.clearConfirm, lang))) {
          store.clearAll().catch(err => console.error('[admin] clearAll failed', err));
          refresh();
        }
      };

      // Sıralama: yeni siparişler üstte, ama içinde durum sırası gözetilsin
      // (yeni → preparing → ready, en yeni en üstte)
      const sorted = useMemo(() => {
        const order = { new: 0, preparing: 1, ready: 2 };
        return [...orders].sort((a, b) => {
          const so = order[a.status] - order[b.status];
          if (so !== 0) return so;
          return b.createdAt - a.createdAt;
        });
      }, [orders]);

      // Authed degilse login goster
      if (!authed) {
        return <LoginGate lang={lang} onLangChange={setLang} onSuccess={() => setAuthed(true)} />;
      }

      // Stats view icin tum siparisleri birlestir
      const allOrders = useMemo(() => [...orders, ...archive], [orders, archive]);

      return (
        <>
          <AdminHeader
            count={orders.length}
            soundOn={soundOn}
            onToggleSound={() => setSoundOn(s => !s)}
            onClearAll={handleClear}
            onLogout={handleLogout}
            lang={lang}
            onLangChange={setLang}
          />

          <TabBar tab={tab} onChange={setTab} lang={lang} />

          {tab === 'orders' ? (
            <>
              <main className="max-w-7xl mx-auto px-6 py-6">
                {sorted.length === 0 ? (
                  <EmptyState lang={lang} />
                ) : (
                  <div className="grid gap-4" style={{ gridTemplateColumns: 'repeat(auto-fill, minmax(320px, 1fr))' }}>
                    {sorted.map(o => (
                      <OrderCard
                        key={o.id}
                        order={o}
                        isNew={newOrderIds.has(o.id)}
                        onAdvance={handleAdvance}
                        onCancel={handleCancel}
                        onClick={setDetailOrder}
                        lang={lang}
                      />
                    ))}
                  </div>
                )}
              </main>

              <Archive orders={archive} lang={lang} />
            </>
          ) : (
            <StatsView allOrders={allOrders} lang={lang} />
          )}

          <footer className="text-center py-8 text-[10px] tracking-[0.25em] uppercase text-muted-soft no-print">
            Olea · {t(UI.panelTitle, lang)} · {sorted.length === 0 ? t(UI.footerSilent, lang) : `${sorted.length} ${t(UI.footerActive, lang)}`}
          </footer>

          {/* Detay modal */}
          {detailOrder && (
            <OrderDetailModal
              order={allOrders.find(o => o.id === detailOrder.id) || detailOrder}
              onClose={() => setDetailOrder(null)}
              onAdvance={handleAdvance}
              onCancel={handleCancel}
              onPrint={handlePrint}
              lang={lang}
            />
          )}

          {/* Print receipt — sadece yazdırma sırasında görünür */}
          <PrintReceipt order={printOrder} mode={printMode} lang={lang} />
        </>
      );
    }

    createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
